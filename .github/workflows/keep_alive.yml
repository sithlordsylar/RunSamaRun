name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 00:00 every Tuesday and Friday (keeps it active every ~3 days)
    - cron: '0 0 * * 2,5'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Leaderboard Table
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/scores?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
